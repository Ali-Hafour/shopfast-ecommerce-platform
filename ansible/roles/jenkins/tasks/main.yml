- name: Install Java (Jenkins dependency)
  apt: { name: openjdk-17-jre, state: present }

- name: Add Jenkins GPG key
  apt_key:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    state: present

- name: Add Jenkins repository
  apt_repository:
    repo: "deb https://pkg.jenkins.io/debian-stable binary/"
    state: present

- name: Install Jenkins
  apt: { name: jenkins, state: present, update_cache: yes }

- name: Ensure Jenkins service is running
  service: { name: jenkins, state: started, enabled: yes }

- name: Allow Jenkins port through UFW
  ufw: { rule: allow, port: '8080', proto: tcp }
