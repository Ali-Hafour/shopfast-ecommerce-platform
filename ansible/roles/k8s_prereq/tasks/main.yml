- name: Disable swap (required by kubelet)
  command: swapoff -a

- name: Remove swap entry from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    line: '# \1'
    backrefs: yes

- name: Load kernel modules for Kubernetes networking
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Load overlay module
  modprobe: { name: overlay, state: present }

- name: Load br_netfilter module
  modprobe: { name: br_netfilter, state: present }

- name: Set sysctl params for Kubernetes
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl params
  command: sysctl --system

- name: Add Kubernetes apt key
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    state: present

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    state: present

- name: Install kubelet, kubeadm, kubectl
  apt:
    name: [kubelet, kubeadm, kubectl]
    state: present
    update_cache: yes

- name: Hold Kubernetes packages at current version
  dpkg_selections: { name: "{{ item }}", selection: hold }
  loop: [kubelet, kubeadm, kubectl]
