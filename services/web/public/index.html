<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopFast — Demo E-Commerce</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 900px; margin: 40px auto; background:#f7f7f9; }
  h1 { color:#1a1a2e; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
  .card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .card h3 { margin:0 0 8px; }
  button { background:#4f46e5; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; }
  #search { padding:8px; width:60%; margin-bottom:16px; border-radius:6px; border:1px solid #ccc; }
  #msg { margin:10px 0; color:#16a34a; font-weight:bold; }
</style>
</head>
<body>
  <h1>🛒 ShopFast</h1>
  <input id="search" placeholder="Search products...">
  <button onclick="search()">Search</button>
  <div id="msg"></div>
  <div class="grid" id="products"></div>

<script>
async function loadProducts() {
  const res = await fetch('/api/products');
  render(await res.json());
}
async function search() {
  const q = document.getElementById('search').value;
  const res = await fetch('/search?q=' + encodeURIComponent(q));
  render(await res.json());
}
function render(products) {
  const el = document.getElementById('products');
  el.innerHTML = products.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.description || ''}</p>
      <p><b>$${p.price}</b> — stock: ${p.stock}</p>
      <button onclick="buy(${p.id})">Buy 1</button>
    </div>`).join('');
}
async function buy(id) {
  const res = await fetch('/api/orders', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ product_id: id, quantity: 1 })
  });
  const data = await res.json();
  document.getElementById('msg').innerText = res.ok
    ? 'Order placed! Order #' + data.id
    : 'Error: ' + (data.error || 'unknown');
  loadProducts();
}
loadProducts();
</script>
</body>
</html>
