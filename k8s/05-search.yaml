apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: ecommerce
spec:
  replicas: 1
  selector: { matchLabels: { app: search } }
  template:
    metadata:
      labels: { app: search }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: search
          image: ECR_REGISTRY/ecommerce-devops-search:IMAGE_TAG
          ports: [{ containerPort: 5000 }]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: db-secret }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          readinessProbe: { httpGet: { path: /health, port: 5000 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 5000 }, initialDelaySeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: ecommerce
spec:
  selector: { app: search }
  ports: [{ port: 5000, targetPort: 5000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-hpa
  namespace: ecommerce
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: search }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
