global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics

  - job_name: 'payment'
    static_configs:
      - targets: ['payment:4000']
    metrics_path: /metrics

  - job_name: 'search'
    static_configs:
      - targets: ['search:5000']
    metrics_path: /metrics

  - job_name: 'web'
    static_configs:
      - targets: ['web:8080']
    metrics_path: /metrics

  # In Kubernetes, replace static_configs with kubernetes_sd_configs
  # to auto-discover pods via annotations (prometheus.io/scrape: "true")
